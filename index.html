<!DOCTYPE html>
<html>
  <head>
    <title>Haylee Payday</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="childGroup">
      <h2 class="child">Haylee</h2>
      <h3 class="weekOf" id="week">Week Of</h3>
    </div>
    <p>Chores</p>
    <div class="weekBlocks">
      <div class="day">
        <p>Monday</p>
        <input type="checkbox" id="checkbox" class="checkbox" />
      </div>
      <div class="day">
        <p>Tuesday</p>
        <input type="checkbox" id="checkbox" class="checkbox" />
      </div>
      <div class="day">
        <p>Wednesday</p>
        <input type="checkbox" id="checkbox" class="checkbox" />
      </div>
      <div class="day">
        <p>Thursday</p>
        <input type="checkbox" id="checkbox" class="checkbox" />
      </div>
      <div class="day">
        <p>Friday</p>
        <input type="checkbox" id="checkbox" class="checkbox" />
      </div>
      <div class="day">
        <p>Saturday</p>
        <input type="checkbox" id="checkbox" class="checkbox" />
      </div>
      <div class="day">
        <p>Sunday</p>
        <input type="checkbox" id="checkbox" class="checkbox" />
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
