<!DOCTYPE html>
<html>
  <head>
    <title>Haylee Payday</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="childGroup">
      <h2 class="child">Haylee</h2>
      <h3 class="weekOf" id="week">Week Of</h3>
    </div>
    <p>Chores</p>
    <div class="weekBlocks">
      <div class="day">
        <p>Monday</p>
        <input type="checkbox" id="checkbox" class="dayCheckbox" />
      </div>
      <div class="day">
        <p>Tuesday</p>
        <input type="checkbox" id="checkbox" class="dayCheckbox" />
      </div>
      <div class="day">
        <p>Wednesday</p>
        <input type="checkbox" id="checkbox" class="dayCheckbox" />
      </div>
      <div class="day">
        <p>Thursday</p>
        <input type="checkbox" id="checkbox" class="dayCheckbox" />
      </div>
      <div class="day">
        <p>Friday</p>
        <input type="checkbox" id="checkbox" class="dayCheckbox" />
      </div>
      <div class="day">
        <p>Saturday</p>
        <input type="checkbox" id="checkbox" class="dayCheckbox" />
      </div>
      <div class="day">
        <p>Sunday</p>
        <input type="checkbox" id="checkbox" class="dayCheckbox" />
      </div>
    </div>
    <div>
      <p id="choresCompleted">Chores Completed: 0 / 3</p>
      <div class="pay">
        <p id="payDue">Pay Due: $0</p>
        <div class="paidSection">
          <label for="paidCheckbox">Paid</label>
          <input class="paidCheckbox" id="paidCheckbox" type="checkbox">
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
