<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bade Bucks</title>
  <link rel="stylesheet" href="styles.css" />
</head>

  <body>
    <div class="childGroup">
      <div class="child">
        <h2 id="childName"></h2>
        <select name="child" id="childOption">
          <option value="">Select Child</option>
        </select>
      </div>
      <div class="weekOf">
        <h3 id="week"></h3>
        <select name="weekOf" id="weekOption">
          <option value="">Select Week</option>
        </select>
      </div>
    </div>
    <p>Chores</p>
    <div class="weekBlocks">
      <div class="day">
        <p>Monday</p>
        <input type="checkbox" class="dayCheckbox" id="monday" />
      </div>
      <div class="day">
        <p>Tuesday</p>
        <input type="checkbox" class="dayCheckbox" id="tuesday" />
      </div>
      <div class="day">
        <p>Wednesday</p>
        <input type="checkbox" class="dayCheckbox" id="wednesday" />
      </div>
      <div class="day">
        <p>Thursday</p>
        <input type="checkbox" class="dayCheckbox" id="thursday" />
      </div>
      <div class="day">
        <p>Friday</p>
        <input type="checkbox" class="dayCheckbox" id="friday" />
      </div>
      <div class="day">
        <p>Saturday</p>
        <input type="checkbox" class="dayCheckbox" id="saturday" />
      </div>
      <div class="day">
        <p>Sunday</p>
        <input type="checkbox" class="dayCheckbox" id="sunday" />
      </div>
    </div>
    <div>
      <p id="choresCompleted">Chores Completed: 0</p>
      <div class="pay">
        <p id="payDue">Pay Due: $0</p>
        <div class="paidSection">
          <label for="paidCheckbox">Paid</label>
          <input class="paidCheckbox" id="paidCheckbox" type="checkbox">
        </div>
      </div>
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
